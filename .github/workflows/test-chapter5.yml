name: E2E tests (library)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm ci

      - name: Install library-frontend dependencies
        working-directory: library-frontend
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests-chapter5
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests-chapter5
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests-chapter5
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests-chapter5/playwright-report/
          retention-days: 7
